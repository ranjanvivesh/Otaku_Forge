{% extends 'base.html' %}

{% block title %}Login | OtakuForge{% endblock %}

{% block content %}
<section class="auth-panel">
  <h1 class="auth-title">Login</h1>
  <form class="auth-form" method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    <div class="auth-field">
      <label for="email">Email</label>
      <input class="auth-input" type="email" id="email" name="email" value="{{ email|default:'' }}" required />
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <input class="auth-input" type="password" id="password" name="password" required />
    </div>
    <button class="auth-submit" type="submit">Login</button>
  </form>

  <a class="google-btn" href="{% url 'accounts:google_login' %}">
    <i class="fa-brands fa-google"></i>
    Login with Google
  </a>

  <div class="auth-links">
    New here? <a href="{% url 'accounts:register' %}">Create an account</a>
  </div>
</section>
{% endblock %}
